server:
  port: 8085

spring:
  application:
    name: CROP-SERVICE

  datasource:
    url: jdbc:h2:mem:cropdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true